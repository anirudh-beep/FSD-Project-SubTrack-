<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 SubTrack - Calendar</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">📅 SubTrack</h1>
            <nav class="nav">
                <a href="index.html" class="nav-link">Dashboard</a>
                <a href="calendar.html" class="nav-link active">Calendar</a>
                <a href="analytics.html" class="nav-link">Analytics</a>
                <a href="notifications.html" class="nav-link">
                    Notifications
                    <span id="notificationBadge" class="notification-badge" style="display: none;">0</span>
                </a>
                <a href="profile.html" class="nav-link">Profile</a>
                <button id="themeToggle" class="theme-toggle">🌙</button>
                <div class="user-menu">
                    <button id="userMenuBtn" class="user-menu-btn">
                        <span id="currentUserName">User</span> ▼
                    </button>
                    <div id="userDropdown" class="user-dropdown">
                        <a href="#" id="switchAccount">Switch Account</a>
                        <a href="#" id="changePassword">Change Password</a>
                        <a href="#" id="logoutBtn">Logout</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="card">
                <div class="calendar-header">
                    <button id="prevMonth" class="btn btn-secondary">‹</button>
                    <h2 id="currentMonth">January 2024</h2>
                    <button id="nextMonth" class="btn btn-secondary">›</button>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <div class="calendar-day-header">Sun</div>
                    <div class="calendar-day-header">Mon</div>
                    <div class="calendar-day-header">Tue</div>
                    <div class="calendar-day-header">Wed</div>
                    <div class="calendar-day-header">Thu</div>
                    <div class="calendar-day-header">Fri</div>
                    <div class="calendar-day-header">Sat</div>
                </div>
            </div>

            <div class="card">
                <h3>Renewals for Selected Date</h3>
                <div id="selectedDateRenewals" class="renewal-list">
                    <p class="no-renewals">Select a date to view renewals</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/calendar.js"></script>
</body>
</html>
