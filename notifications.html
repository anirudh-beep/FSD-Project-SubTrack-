<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 SubTrack - Notifications</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">📅 SubTrack</h1>
            <nav class="nav">
                <a href="index.html" class="nav-link">Dashboard</a>
                <a href="calendar.html" class="nav-link">Calendar</a>
                <a href="analytics.html" class="nav-link">Analytics</a>
                <a href="notifications.html" class="nav-link active">
                    Notifications
                    <span id="notificationBadge" class="notification-badge" style="display: none;">0</span>
                </a>
                <a href="profile.html" class="nav-link">Profile</a>
                <button id="themeToggle" class="theme-toggle">🌙</button>
                <div class="user-menu">
                    <button id="userMenuBtn" class="user-menu-btn">
                        <span id="currentUserName">User</span> ▼
                    </button>
                    <div id="userDropdown" class="user-dropdown">
                        <a href="#" id="switchAccount">Switch Account</a>
                        <a href="#" id="changePassword">Change Password</a>
                        <a href="#" id="logoutBtn">Logout</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="card">
                <div class="notifications-header">
                    <h2>Notification Center</h2>
                    <div class="notification-actions">
                        <button id="markAllRead" class="btn btn-secondary">Mark All Read</button>
                        <button id="clearAll" class="btn btn-danger">Clear All</button>
                    </div>
                </div>
                
                <div class="notification-filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="renewal">Renewals</button>
                    <button class="filter-btn" data-filter="payment">Payments</button>
                    <button class="filter-btn" data-filter="system">System</button>
                </div>

                <div id="notificationsList" class="notifications-list">
                    <!-- Notifications will be loaded here -->
                </div>
            </div>

            <div class="card">
                <h3>Notification Settings</h3>
                <div class="notification-settings">
                    <div class="setting-item">
                        <label class="checkbox-label">
                            <input type="checkbox" id="browserNotifications" checked>
                            <span class="checkmark"></span>
                            Enable browser notifications
                        </label>
                    </div>
                    <div class="setting-item">
                        <label class="checkbox-label">
                            <input type="checkbox" id="soundAlerts" checked>
                            <span class="checkmark"></span>
                            Sound alerts
                        </label>
                    </div>
                    <div class="setting-item">
                        <label for="reminderDays">Reminder days before renewal:</label>
                        <select id="reminderDays">
                            <option value="3">3 days</option>
                            <option value="7" selected>7 days</option>
                            <option value="14">14 days</option>
                        </select>
                    </div>
                    <button id="saveNotificationSettings" class="btn btn-primary">Save Settings</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/notifications.js"></script>
</body>
</html>
