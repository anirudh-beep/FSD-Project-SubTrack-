<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 SubTrack - Profile</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">📅 SubTrack</h1>
            <nav class="nav">
                <a href="index.html" class="nav-link">Dashboard</a>
                <a href="profile.html" class="nav-link active">Profile</a>
                <button id="themeToggle" class="theme-toggle">🌙</button>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="card form-card">
                <h2>Profile Settings</h2>
                <form id="profileForm">
                    <div class="form-group">
                        <label for="userName">Full Name</label>
                        <input type="text" id="userName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="userEmail">Email</label>
                        <input type="email" id="userEmail" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="currency">Currency Preference</label>
                        <select id="currency">
                            <option value="₹">₹ (INR)</option>
                            <option value="$">$ (USD)</option>
                            <option value="€">€ (EUR)</option>
                            <option value="£">£ (GBP)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="monthlyBudget">Monthly Budget</label>
                        <input type="number" id="monthlyBudget" min="100" placeholder="5000">
                    </div>
                    
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="notifications">
                            <span class="checkmark"></span>
                            Enable renewal notifications
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="darkMode">
                            <span class="checkmark"></span>
                            Dark mode by default
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Save Settings</button>
                </form>
            </div>

            <div class="card">
                <h3>Data Management</h3>
                <div class="data-management">
                    <button id="exportData" class="btn btn-secondary">Export All Data</button>
                    <button id="importData" class="btn btn-secondary">Import Data</button>
                    <input type="file" id="importDataFile" accept=".json" style="display: none;">
                    <button id="clearData" class="btn btn-danger">Clear All Data</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/auth.js?v=2"></script>
    <script>
        $(document).ready(async function() {
            const authed = await checkAuth();
            if (!authed) return;

            await loadProfile();

            $('#themeToggle').click(function() { toggleTheme(); });
            $('#logoutBtn').click(function() { logout(); });
            $('#profileForm').submit(function(e) { e.preventDefault(); saveProfile(); });
            $('#exportData').click(exportData);
            $('#importData').click(function() { $('#importDataFile').click(); });
            $('#importDataFile').change(importData);
            $('#clearData').click(clearData);
        });

        async function loadProfile() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return;

            $('#userEmail').val(session.user.email);
            $('#userName').val(session.user.user_metadata?.name || session.user.email.split('@')[0]);

            const { data } = await _supabase.from('user_settings').select('*').eq('user_id', session.user.id).single();
            if (data) {
                $('#currency').val(data.currency || '₹');
                $('#monthlyBudget').val(data.monthly_budget || 5000);
                $('#notifications').prop('checked', data.notifications !== false);
            }
            $('#darkMode').prop('checked', localStorage.getItem('theme') === 'dark');
        }

        async function saveProfile() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return;
            const uid = session.user.id;

            const name = $('#userName').val().trim();

            // Update auth metadata (name)
            await _supabase.auth.updateUser({ data: { name } });

            // Upsert user_settings
            const { error } = await _supabase.from('user_settings').upsert({
                user_id: uid,
                full_name: name,
                currency: $('#currency').val(),
                monthly_budget: parseFloat($('#monthlyBudget').val()) || 5000,
                notifications: $('#notifications').is(':checked')
            });

            if (error) { showToast('Error saving settings', 'error'); return; }

            const darkMode = $('#darkMode').is(':checked');
            const newTheme = darkMode ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeToggle(newTheme);

            showToast('Profile updated successfully!', 'success');
        }

        async function exportData() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return;
            const uid = session.user.id;

            const [subs, cats, settings, notifs, payments] = await Promise.all([
                _supabase.from('subscriptions').select('*').eq('user_id', uid),
                _supabase.from('categories').select('*').eq('user_id', uid),
                _supabase.from('user_settings').select('*').eq('user_id', uid).single(),
                _supabase.from('notifications').select('*').eq('user_id', uid),
                _supabase.from('payment_history').select('*').eq('user_id', uid)
            ]);

            const exportObj = {
                subscriptions: subs.data || [],
                categories: cats.data || [],
                settings: settings.data || {},
                notifications: notifs.data || [],
                paymentHistory: payments.data || [],
                exportDate: new Date().toISOString(),
                version: '2.0'
            };

            const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `subtrack-backup-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            showToast('Data exported successfully!', 'success');
        }

        async function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return;
            const uid = session.user.id;

            const reader = new FileReader();
            reader.onload = async function(event) {
                try {
                    const d = JSON.parse(event.target.result);

                    if (d.subscriptions?.length) {
                        const rows = d.subscriptions.map(s => ({ ...s, user_id: uid }));
                        await _supabase.from('subscriptions').upsert(rows);
                    }
                    if (d.categories?.length) {
                        const rows = d.categories.map(c => ({ ...c, user_id: uid }));
                        await _supabase.from('categories').upsert(rows);
                    }

                    showToast('Data imported successfully!', 'success');
                    setTimeout(() => window.location.reload(), 1000);
                } catch (err) {
                    showToast('Error importing data', 'error');
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        async function clearData() {
            if (!confirm('Are you sure you want to clear ALL your data? This cannot be undone.')) return;

            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return;
            const uid = session.user.id;

            const [r1, r2, r3, r4] = await Promise.all([
                _supabase.from('subscriptions').delete().eq('user_id', uid),
                _supabase.from('categories').delete().eq('user_id', uid),
                _supabase.from('notifications').delete().eq('user_id', uid),
                _supabase.from('payment_history').delete().eq('user_id', uid)
            ]);

            const errs = [r1, r2, r3, r4].filter(r => r.error).map(r => r.error.message);
            if (errs.length) {
                showToast('Error clearing some data: ' + errs[0], 'error');
                return;
            }

            showToast('All data cleared!', 'success');
            setTimeout(() => window.location.reload(), 1000);
        }

        function showToast(message, type = 'info') {
            if ($('#toastContainer').length === 0) {
                $('body').append('<div id="toastContainer" class="toast-container"></div>');
            }
            const toast = $(`<div class="toast ${type}"><div class="toast-content"><p>${message}</p></div></div>`);
            $('#toastContainer').append(toast);
            setTimeout(() => toast.fadeOut(() => toast.remove()), 3000);
        }

        function updateThemeToggle(theme) {
            $('#themeToggle').text(theme === 'dark' ? '☀️' : '🌙');
        }
    </script>
</body>
</html>
